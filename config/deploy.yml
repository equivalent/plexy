# Name of your application. Used to uniquely configure containers.
service: plexy

# Name of the container image.
image: plexy

# Deploy to these servers.
servers:
  web:
    - deploy.ahow.app
  # pgbus job workers (no in-Puma supervisor).
  job:
    hosts:
      - deploy.ahow.app
    cmd: bin/pgbus start

# kamal-proxy terminates TLS (auto Let's Encrypt) and forwards HTTP to the app.
# Requires config.assume_ssl and config.force_ssl in production.rb.
proxy:
  ssl: true
  host: plexy.eq8.eu

# Where you keep your container images.
registry:
  server: localhost:5555

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - PLEXY_DATABASE_PASSWORD
  clear:
    # Postgres runs as the "db" accessory below; reachable on the kamal docker
    # network under <service>-<accessory> = plexy-db.
    DB_HOST: plexy-db

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  rc: app exec --interactive --reuse "bin/rails console"
  sh: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent volume for local Active Storage files.
# Back this up off-server.
volumes:
  - "/root/plexy_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    # Keep the major version in sync with the Postgres used in development.
    image: postgres:18
    host: deploy.ahow.app
    # Bound to localhost only — app containers reach it over the kamal docker
    # network as plexy-db:5432; the host binding is for ssh-tunnel debugging.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: plexy
        POSTGRES_DB: plexy_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      # The postgres:18 image moved its data mount point up to /var/lib/postgresql
      # (mounting the old /var/lib/postgresql/data subdir no longer persists data).
      - /root/plexy_db_data:/var/lib/postgresql
